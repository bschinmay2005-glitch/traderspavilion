<!DOCTYPE html>
<html>
<head>
    <title>Nifty Sectoral Heatmap</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-10">
    <h1 class="text-3xl font-bold text-center mb-8">Nifty Sectoral Performance (%)</h1>
    <div class="max-w-4xl mx-auto bg-gray-800 p-6 rounded-xl">
        <canvas id="sectorChart"></canvas>
    </div>

    <script>
        async function loadChart() {
            const response = await fetch('data.json');
            const data = await response.json();

            new Chart(document.getElementById('sectorChart'), {
                type: 'bar',
                data: {
                    labels: data.map(s => s.name),
                    datasets: [{
                        data: data.map(s => s.perc),
                        backgroundColor: data.map(s => s.color),
                        borderRadius: 5
                    }]
                },
                options: {
                    indexAxis: 'y',
                    scales: { x: { grid: { color: '#4B5563' } } }
                }
            });
        }
        loadChart();
    </script>
</body>
</html>
