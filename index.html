<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradersPavilion | Sectoral Velocity</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <header class="border-b border-slate-700 pb-6 mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-4xl font-800 tracking-tighter text-white">
                    Traders<span class="text-green-500">Pavilion</span>
                </h1>
                <p class="text-slate-400 text-sm tracking-wide uppercase">Sectoral Analysis • Prev. Close vs Real-time</p>
            </div>
            <div class="bg-slate-800/50 px-4 py-2 rounded-lg border border-slate-700">
                <span class="flex items-center gap-2 text-xs font-mono">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                    </span>
                    MARKET LIVE: <span id="update-time">--:--:--</span>
                </span>
            </div>
        </header>

        <main class="bg-slate-800/40 border border-slate-700 p-6 rounded-2xl shadow-2xl backdrop-blur-sm">
            <div class="flex justify-between items-end mb-6">
                <h2 class="text-xl font-bold text-white">Nifty Sectoral Heatmap (%)</h2>
                <div class="text-xs text-slate-500 italic">*Bars represent % change from previous session close</div>
            </div>
            
            <div class="relative h-[500px]">
                <canvas id="sectorChart"></canvas>
            </div>
        </main>

        <footer class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bg-green-500/10 border border-green-500/20 p-4 rounded-xl">
                <p class="text-xs text-green-500 font-bold uppercase tracking-widest">Top Outperformer</p>
                <p id="top-gainer" class="text-xl font-bold text-white mt-1">--</p>
            </div>
            <div class="bg-red-500/10 border border-red-500/20 p-4 rounded-xl">
                <p class="text-xs text-red-500 font-bold uppercase tracking-widest">Top Underperformer</p>
                <p id="top-loser" class="text-xl font-bold text-white mt-1">--</p>
            </div>
        </footer>
    </div>

    <script>
        async function loadDashboard() {
            try {
                // Fetching the JSON data generated by your GitHub Action
                const response = await fetch('data.json');
                const sectorData = await response.json();

                // Sort data so highest gainers are at the top
                sectorData.sort((a, b) => b.perc - a.perc);

                const labels = sectorData.map(s => s.name);
                const values = sectorData.map(s => s.perc);
                const colors = sectorData.map(s => s.perc >= 0 ? '#22c55e' : '#ef4444');

                // Update Summary Text
                document.getElementById('top-gainer').innerText = `${sectorData[0].name} (${sectorData[0].perc}%)`;
                document.getElementById('top-loser').innerText = `${sectorData[sectorData.length - 1].name} (${sectorData[sectorData.length - 1].perc}%)`;
                document.getElementById('update-time').innerText = new Date().toLocaleTimeString();

                const ctx = document.getElementById('sectorChart').getContext('2d');
                
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: values,
                            backgroundColor: colors,
                            borderRadius: 6,
                            borderSkipped: false,
                            barThickness: 25
                        }]
                    },
                    options: {
                        indexAxis: 'y',
                        maintainAspectRatio: false,
                        responsive: true,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: '#1e293b',
                                titleColor: '#fff',
                                bodyColor: '#cbd5e1',
                                callbacks: {
                                    label: (item) => ` Change: ${item.parsed.x}%`
                                }
                            }
                        },
                        scales: {
                            x: {
                                grid: { color: '#334155', drawBorder: false },
                                ticks: { 
                                    color: '#94a3b8',
                                    callback: (v) => v + '%'
                                }
                            },
                            y: {
                                grid: { display: false },
                                ticks: { color: '#f1f5f9', font: { weight: 'bold' } }
                            }
                        }
                    }
                });
            } catch (error) {
                console.error("Data not found. Ensure data.json is being generated.", error);
            }
        }

        loadDashboard();
    </script>
</body>
</html>
